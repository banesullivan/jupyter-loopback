<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140" role="img" aria-label="jupyter-loopback">
  <title>jupyter-loopback</title>
  <style><![CDATA[
    .fg   { fill: #111827; }
    .mute { fill: #6b7280; }
    @media (prefers-color-scheme: dark) {
      .fg   { fill: #f3f4f6; }
      .mute { fill: #9ca3af; }
    }
  ]]></style>

  <!-- Mark: a clean loop, with flow arrows on the stroke
       and two endpoint glyphs sitting inside it. -->
  <g transform="translate(10 10)">
    <!-- The loop -->
    <ellipse cx="60" cy="60" rx="44" ry="34"
             fill="none" stroke="#F37626" stroke-width="3.5"/>

    <!-- top-of-loop arrow (east — flow out from kernel to browser) -->
    <polygon fill="#F37626" points="55,17 75,26 55,35"/>
    <!-- bottom-of-loop arrow (west — flow back browser to kernel) -->
    <polygon fill="#F37626" points="65,85 45,94 65,103"/>

    <!-- left endpoint: filled disc (kernel / 127.0.0.1) -->
    <circle cx="34" cy="60" r="8" fill="#F37626"/>
    <!-- right endpoint: ring (browser) -->
    <circle cx="86" cy="60" r="7" fill="none" stroke="#F37626" stroke-width="3"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(140 0)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Helvetica, Arial, sans-serif">
    <text x="0" y="78" class="fg" font-size="44" font-weight="700" letter-spacing="-0.5">jupyter<tspan class="mute" font-weight="500">-</tspan>loopback</text>
    <text x="2" y="108" class="mute" font-size="17">kernel-local servers, reachable from the browser</text>
  </g>
</svg>
