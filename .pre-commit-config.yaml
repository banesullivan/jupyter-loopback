ci:
  autoupdate_schedule: monthly

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: debug-statements
      - id: trailing-whitespace
      - id: check-docstring-first
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-yaml
      - id: check-toml
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --show-fixes]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^jupyter_loopback/
        additional_dependencies:
          - jupyter-server>=2
          - tornado>=6.2
          - anywidget>=0.9

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml, markdown, json]

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.36.1
    hooks:
      - id: check-github-workflows

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.2.4
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@2.2.4"]
        files: ^jupyter_loopback/static/.*\.js$

  # JSDoc-based type checking on the JS bundle via the TypeScript compiler.
  # Uses a local hook so contributors don't need npm to install for
  # pre-commit elsewhere; the hook shells out to ``npx tsc``.
  - repo: local
    hooks:
      - id: tsc-checkjs
        name: tsc --checkJs (JSDoc types)
        entry: npx --yes -p typescript@5.6.3 tsc --noEmit -p tsconfig.json
        language: system
        pass_filenames: false
        files: ^(jupyter_loopback/static/.*\.js|tsconfig\.json)$
