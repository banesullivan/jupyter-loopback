name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools-scm needs full history for an accurate version.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build
        run: python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (OIDC trusted publisher)
    needs: build
    runs-on: ubuntu-latest
    # The ``pypi`` environment must exist on this repo and be bound to
    # the PyPI trusted publisher you configured at pypi.org.
    environment:
      name: pypi
      url: https://pypi.org/p/jupyter-loopback
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
